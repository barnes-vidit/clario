services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      - ALLOWED_ORIGINS=http://localhost,http://localhost:5173,http://localhost:5174
    networks:
      - clario

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: http://localhost:8000
        VITE_BACKEND_WS_URL: ws://localhost:8000
    ports:
      - "80:80"
    networks:
      - clario

networks:
  clario:
    driver: bridge
